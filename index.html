<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lucky Fishing Bowl</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Lucky Fishing Bowl</h1>
      <p>Pick a fish to reveal your lucky number.</p>

      <section class="bowl" aria-label="Fishing bowl">
        <div class="water"></div>
        <div id="fish-container" class="fish-container"></div>
      </section>

      <section class="numbers-panel" aria-label="Number choices">
        <h2>Pick a Number</h2>
        <div id="number-buttons" class="number-buttons"></div>
      </section>

      <div id="banner" class="banner" role="status" aria-live="polite"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
